services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
      - web

  api:
    build:
      context: ..
      dockerfile: ${API_DOCKERFILE:-Dockerfile.lite}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://bookly:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/bookly
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      ENVIRONMENT: production
      COOKIE_SECURE: "true"
      CORS_ORIGINS: '["https://${DOMAIN}"]'
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_TTS_MODEL: ${GEMINI_TTS_MODEL:-gemini-3.1-flash-tts-preview}
      TTS_ENGINE: ${TTS_ENGINE:-kokoro-onnx}
      ORPHEUS_URL: ${ORPHEUS_URL:-http://localhost:8080}
    volumes:
      - bookly-data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../../Bookly-AI-client
      args:
        API_URL: http://api:8000
    restart: unless-stopped
    depends_on:
      - api

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: bookly
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookly -d bookly"]
      interval: 10s
      timeout: 3s
      retries: 12
    volumes:
      - bookly-pgdata:/var/lib/postgresql

volumes:
  caddy-data:
  caddy-config:
  bookly-data:
  bookly-pgdata:
