services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bookly:${POSTGRES_PASSWORD:-bookly}@db:5432/bookly
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env before deploying}
      ENVIRONMENT: production
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - bookly-data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../Bookly-AI-client
      args:
        API_URL: http://api:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bookly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookly}
      POSTGRES_DB: bookly
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookly -d bookly"]
      interval: 10s
      timeout: 3s
      retries: 12
    volumes:
      - bookly-pgdata:/var/lib/postgresql

volumes:
  bookly-data:
  bookly-pgdata:
