services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://bookly:bookly@db:5432/bookly
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - bookly-data:/app/data
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "app",
      ]
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: bookly
      POSTGRES_PASSWORD: bookly
      POSTGRES_DB: bookly
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookly -d bookly"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - bookly-pgdata:/var/lib/postgresql

volumes:
  bookly-data:
  bookly-pgdata:
